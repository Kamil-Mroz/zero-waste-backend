spring:
  application:
    name: zero-waste
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5543}/${DB_NAME:zero-waste-db}
    username: '${DB_USER:zero-waste-user}'
    password: '${DB_PASSWORD:zero-waste-password}'
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  mvc:
    apiversion:
      default: '1'
      supported: '1,2'
      use:
        path-segment: '1'
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8888/realms/zero-waste


app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    password: ${DEV_PASSWORD:SecurePassword123!}
jwt:
  secret: '${JWT_SECRET:your-256-bit-secret-key-here-make-it-at-least-32-bytes-long}'
  expiration: '${JWT_EXPIRATION:900000}'
refresh-token:
  expiration: '${REFRESH_TOKEN_EXPIRATION:604800}'
springdoc:
  api-docs:
    path: /api/docs/api-docs
  swagger-ui:
    path: /api/docs/swagger-ui.html
