spring.application.name=zero-waste

jwt.secret=${JWT_SECRET:your-256-bit-secret-key-here-make-it-at-least-32-bytes-long}
jwt.expiration=${JWT_EXPIRATION:900000}
refresh-token.expiration=${REFRESH_TOKEN_EXPIRATION:604800}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5543/zero-waste-db}
spring.datasource.username=${DB_USER:zero-waste-user}
spring.datasource.password=${DB_PASSWORD:zero-waste-password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# logging.level.org.springframework.security: TRACE

spring.mvc.apiversion.supported=1,2
spring.mvc.apiversion.use.path-segment=1
spring.mvc.apiversion.default=1
