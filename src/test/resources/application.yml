spring:
  application:
    name: zero-waste
  datasource:
    url: 'jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE'
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  mvc:
    apiversion:
      default: '1'
      supported: '1,2'
      use:
        path-segment: '1'
jwt:
  secret: '${JWT_SECRET:your-256-bit-secret-key-here-make-it-at-least-32-bytes-long}'
  expiration: '${JWT_EXPIRATION:900000}'

refresh-token:
  expiration: '${REFRESH_TOKEN_EXPIRATION:604800}'
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
springdoc:
  api-docs:
    path: /api/v1/docs/api-docs
  swagger-ui:
    path: /api/v1/docs/swagger-ui.html
