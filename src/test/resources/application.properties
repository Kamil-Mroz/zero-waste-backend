spring.application.name=zero-waste

jwt.secret=${JWT_SECRET:your-256-bit-secret-key-here-make-it-at-least-32-bytes-long}
jwt.expiration=${JWT_EXPIRATION:900000}
# jwt.expiration=${JWT_EXPIRATION:10}
refresh-token.expiration=${REFRESH_TOKEN_EXPIRATION:604800}

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=sa
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# logging.level.org.springframework.security: TRACE

springdoc.api-docs.path=/api/v1/docs/api-docs
springdoc.swagger-ui.path=/api/v1/docs/swagger-ui.html


spring.mvc.apiversion.default=1
spring.mvc.apiversion.supported=1,2
spring.mvc.apiversion.use.path-segment=1
